apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: federamed-db-secret
  namespace: federamed-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-store
  target:
    name: federamed-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: federamed/prod/db
        property: password
    - secretKey: db-user
      remoteRef:
        key: federamed/prod/db
        property: username
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: federamed-jwt-secret
  namespace: federamed-ai
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-store
  target:
    name: federamed-jwt-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: federamed/prod/jwt
        property: secret
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwtAuth:
          serviceAccountRef:
            name: external-secrets-sa