apiVersion: v1
kind: ConfigMap
metadata:
  name: federamed-config
  namespace: federamed-ai
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  
  # Database
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "federamed"
  
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  
  # MLflow
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
  
  # Flower
  FLOWER_SERVER_ADDRESS: "flower-server-service:9092"
  
  # Observability
  METRICS_PORT: "8001"
  API_PORT: "8000"
  GRAFANA_PORT: "3001" # Changed from 3000 to avoid conflict with Node.js
  
  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"