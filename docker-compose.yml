version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: fedmed_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: fedmed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: bitnami/mlflow:latest
    container_name: fedmed_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://postgres:postgrespassword@postgres:5432/fedmed
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mlflow_data:/mlruns

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fedmed_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/fedmed
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fedmed_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mlflow_data:
